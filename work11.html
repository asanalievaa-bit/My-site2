<!DOCTYPE html>
<html>
<head>
    <title>Карточка тарифа</title>
</head>
<body>
    <!-- Контейнер карточки -->
    <div class="pricing-card">
        <!-- Заголовок тарифа -->
        <h3>Pro Plan</h3>
        
        <!-- Блок с ценой -->
        <div class="price">$29/мес</div>
        
        <!-- Список преимуществ -->
        <ul class="features">
            <li>Безлимитные проекты</li>
            <li>Поддержка 24/7</li>
            <li>100 ГБ хранилища</li>
            <li>Доступ для 5 пользователей</li>
        </ul>
        
        <!-- Кнопка -->
        <button>Выбрать тариф</button>
    </div>
</body>
</html>
